<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stochastic Particle Simulation</title>
    <link rel="stylesheet" href="style.css" />
    <!-- p5.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="../shared/nav.js" defer></script>
  </head>
  <body>
    <div id="controls-container">
      <div id="simulation-controls">
        <h3>Visualization Controls</h3>
        <label for="particleCount">Particles:</label>
        <input type="range" id="particleCount" min="1" max="50" value="25" />
        <span id="particleCountLabel">25</span>
        <br />
        <label for="simSpeed">Speed:</label>
        <input type="range" id="simSpeed" min="0.1" max="10" step="0.1" value="1" />
        <span id="simSpeedLabel">1</span>
        <br />
        <label for="stepSize">Step Size:</label>
        <input type="range" id="stepSize" min="1" max="20" value="5" />
        <span id="stepSizeLabel">5</span>
        <br />
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="restartBtn">Restart</button>
        <br />
        <label for="pathToggle">Show Pathlines:</label>
        <input type="checkbox" id="pathToggle" checked />
      </div>
      <div id="distribution-controls">
        <h3>Distribution Controls</h3>
        <label for="distSelect">Distribution:</label>
        <select id="distSelect">
          <option value="gaussian" selected>Brownian (Gaussian)</option>
          <option value="levy">Levy Flight</option>
        </select>
        <br />
        <button id="resetHistBtn">Reset Histogram</button>
      </div>
    </div>
    <!-- Container for the canvas -->
    <div id="canvas-container"></div>

    <script src="sketch.js"></script>
  </body>
</html>
