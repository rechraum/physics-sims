<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Double Pendulum Chaos Visualization</title>
    <link rel="stylesheet" href="style.css" />
    <!-- p5.js library from CDN (DOM features are built into p5.js v1.x) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <script src="../shared/nav.js" defer></script>
  </head>
  <body>
    <div id="controls">
      <button id="startButton">Start / Restart</button>
      <label>
        Grid Resolution:
        <input id="gridSlider" type="range" min="10" max="100" value="50" />
        <span id="gridVal">50</span>×<span id="gridVal">50</span>
      </label>
      <label>
        Simulation Speed:
        <input id="speedSlider" type="range" min="0.1" max="5" step="0.1" value="1" />
        <span id="speedVal">1</span>x
      </label>
      <br />
      <label>
        <input type="checkbox" id="visColor" checked>
        Color Representation
      </label>
      <label>
        <input type="checkbox" id="visStick" checked>
        Stick Figure Representation
      </label>
    </div>
    <script src="DoublePendulumArray.js"></script>
  </body>
</html>
