<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncertainty Principle</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- ── Mode selector ─────────────────────────────────────── -->
        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary mode-btn active" id="mode-btn-measure"
                  onclick="setMode('measure')">Measure</button>
          <button class="btn btn-secondary mode-btn" id="mode-btn-uncertainty"
                  onclick="setMode('uncertainty')">Principle</button>
          <button class="btn btn-secondary mode-btn" id="mode-btn-fourier"
                  onclick="setMode('fourier')">Fourier&nbsp;Dual</button>
        </div>

        <!-- ── Measure mode controls ─────────────────────────────── -->
        <div id="measure-controls">

          <p class="panel-heading" style="margin-top:16px">Measure Type</p>
          <div class="btn-group">
            <button class="btn btn-secondary mtype-btn active" id="mtype-btn-position"
                    onclick="setMeasureType('position')">Position</button>
            <button class="btn btn-secondary mtype-btn" id="mtype-btn-momentum"
                    onclick="setMeasureType('momentum')">Momentum</button>
          </div>

          <p class="panel-heading" style="margin-top:14px">Precision</p>
          <div class="control-group">
            <label>
              <span id="prec-var-label">&Delta;x</span>
              = <span id="measure-prec-val">0.60</span>
            </label>
            <input type="range" id="measure-prec" min="0.2" max="1.5" step="0.05" value="0.6">
            <p class="prec-hint" id="prec-hint">
              coarse x &larr;&ensp;&rarr; sharp x &ensp;&middot;&ensp;
              &Delta;p&thinsp;=&thinsp;1/(2&Delta;x)
            </p>
          </div>

          <button class="btn btn-fire" id="fire-btn" onclick="fireMeasure()">
            &#x25B6;&thinsp;Measure!
          </button>
          <button class="btn btn-restart" id="restart-btn" onclick="restartEvolution()"
                  style="display:none">
            &#x25B6;&thinsp;Restart Time Evolution
          </button>
          <button class="btn btn-secondary" id="reset-btn" onclick="resetMeasure()"
                  style="display:none; margin-top:4px">
            &#x21A9;&thinsp;Reset
          </button>

        </div>

        <!-- ── Explore mode controls ─────────────────────────────── -->
        <div id="explore-controls" style="display:none">

          <p class="panel-heading" style="margin-top:16px">Wave Packet</p>
          <div class="control-group">
            <label>&sigma;<sub>x</sub> = <span id="sigma-x-val">1.00</span></label>
            <input type="range" id="sigma-x" min="0.3" max="2.5" step="0.05" value="1.0">
          </div>

          <p class="panel-heading">Central Momentum</p>
          <div class="control-group">
            <label>k<sub>0</sub> = <span id="k0-val">0.0</span></label>
            <input type="range" id="k0" min="-3" max="3" step="0.1" value="0">
          </div>

          <p class="panel-heading">Shape</p>
          <div class="btn-group">
            <button class="btn btn-secondary shape-btn active" id="shape-btn-gaussian"
                    onclick="setShape('gaussian')">Gaussian</button>
            <button class="btn btn-secondary shape-btn" id="shape-btn-twopeak"
                    onclick="setShape('twopeak')">Two-peak</button>
            <button class="btn btn-secondary shape-btn" id="shape-btn-chirped"
                    onclick="setShape('chirped')">Chirped</button>
          </div>

          <p class="panel-heading" style="margin-top:16px">Readouts</p>
          <div class="energy-info">&Delta;x = <span id="delta-x-val">1.000</span></div>
          <div class="energy-info" style="margin-top:5px">&Delta;p = <span id="delta-p-val">0.500</span></div>
          <div class="energy-info product-pill" id="delta-xp-pill" style="margin-top:5px">
            &Delta;x&thinsp;&middot;&thinsp;&Delta;p = <span id="delta-xp-val">1.000 &#x210F;/2</span>
          </div>

        </div>

      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
