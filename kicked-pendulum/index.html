<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kicked Pendulum</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script src="../shared/nav.js" defer></script>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="controls">
    <button id="pendulum-start-button">Start</button>
    <button id="pendulum-pause-button">Pause</button>
    <button id="pendulum-clear-button">Clear</button>
    <label>
      Kick Strength: <span id="kick-value">10</span>
      <input type="range" id="kick-slider" min="0" max="50" value="10" step="1">
    </label>
    <label>
      Damping: <span id="damping-value">0.995</span>
      <input type="range" id="damping-slider" min="0.90" max="1.00" value="0.995" step="0.001">
    </label>
  </div>

  <script src="sketch.js"></script>
  <script>
    window.onload = function () {
      new p5(kickedPendulumSketch);
    };
  </script>
</body>
</html>
