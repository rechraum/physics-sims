<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relational Network Dynamics</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script src="../shared/nav.js" defer></script>
</head>
<body>
  <div class="sim-wrapper layout-b">
    <div class="sim-canvas-area" id="canvas-container"></div>
    <div class="sim-panel">
      <div class="sim-controls-section">
        <p class="panel-heading">Controls</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="start-button">Start / Restart</button>
          <button class="btn btn-secondary" id="pause-button">Pause</button>
        </div>
        <div class="control-group" style="margin-top:12px;">
          <label>Time Step (ms) <span id="time-step-val">1000</span></label>
          <input type="range" id="time-slider" min="200" max="2000" value="1000" step="50">
        </div>
        <div class="control-group">
          <label>Edges per Update <span id="edge-count-val">1</span></label>
          <input type="range" id="edge-count-slider" min="1" max="10" value="1" step="1">
        </div>
        <div class="control-group">
          <label>Node Temperature <span id="emergent-temp-val">1.0</span></label>
          <input type="range" id="emergent-temp-slider" min="0" max="5" value="1" step="0.1">
        </div>
      </div>
      <div class="sim-edu-section" id="sim-edu"></div>
    </div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
