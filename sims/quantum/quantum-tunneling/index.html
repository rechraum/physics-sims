<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Tunneling</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- ── Energy ─────────────────────────────────────────────── -->
        <p class="panel-heading">Energy</p>
        <div class="control-group">
          <label>E/V&#x2080; = <span id="e-val">0.60</span></label>
          <input type="range" id="e-slider" min="0.05" max="1.95" step="0.01" value="0.6">
          <div class="energy-info" id="tr-readout">T = 0.042&ensp;R = 0.958</div>
        </div>

        <!-- ── Barrier ────────────────────────────────────────────── -->
        <p class="panel-heading">Barrier</p>
        <div class="control-group">
          <label>L = <span id="l-val">2.0</span></label>
          <input type="range" id="l-slider" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
          <label>V&#x2080; = <span id="v0-val">1.0</span></label>
          <input type="range" id="v0-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>

        <!-- ── Display ────────────────────────────────────────────── -->
        <p class="panel-heading">Display</p>
        <div class="btn-group">
          <button class="btn btn-secondary wave-btn" id="wave-btn-psi"
                  onclick="setDisplayWave('psi')">&psi;(x)</button>
          <button class="btn btn-secondary wave-btn" id="wave-btn-prob"
                  onclick="setDisplayWave('prob'">|&psi;|&sup2;</button>
          <button class="btn btn-secondary wave-btn active" id="wave-btn-both"
                  onclick="setDisplayWave('both')">Both</button>
        </div>
        <button class="btn btn-secondary anim-btn" id="anim-btn"
                onclick="toggleAnimate()">&#x23F8; Pause</button>

        <!-- ── Compare ────────────────────────────────────────────── -->
        <p class="panel-heading">Compare</p>
        <div class="btn-group">
          <button class="btn btn-secondary cmp-btn" id="cmp-btn-quantum"
                  onclick="setCompareMode('quantum')">Quantum</button>
          <button class="btn btn-secondary cmp-btn" id="cmp-btn-classical"
                  onclick="setCompareMode('classical')">Classical</button>
          <button class="btn btn-secondary cmp-btn active" id="cmp-btn-both"
                  onclick="setCompareMode('both')">Both</button>
        </div>

        <!-- ── Explore ────────────────────────────────────────────── -->
        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary edu-btn active" id="edu-btn-evanescent"
                  onclick="setEduMode('evanescent')">Evanescent</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-resonance"
                  onclick="setEduMode('resonance')">Resonance</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-applications"
                  onclick="setEduMode('applications')">Apps</button>
        </div>

      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
