<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Interference</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-b">

    <!-- Canvas -->
    <div class="sim-canvas-area" id="canvas-container"></div>

    <!-- Control panel (horizontal strip) -->
    <div class="sim-panel">
      <div class="wave-controls-bar">

        <!-- ── Mode ─────────────────────────────────────────────── -->
        <div class="ctrl-section ctrl-mode">
          <p class="panel-heading">Mode</p>
          <div class="btn-group">
            <button class="btn btn-secondary mode-btn active" id="mode-btn-continuous"
                    onclick="setMode('continuous')">Continuous</button>
            <button class="btn btn-secondary mode-btn" id="mode-btn-snapshot"
                    onclick="setMode('snapshot')">Snapshot</button>
            <button class="btn btn-secondary mode-btn" id="mode-btn-pulse"
                    onclick="setMode('pulse')">Pulse</button>
          </div>
          <button class="btn btn-primary" id="pulse-launch" onclick="launchPulse()">▶ Launch</button>
          <button class="btn btn-secondary" id="pulse-pause" onclick="togglePause()">⏸ Pause</button>
          <div id="snapshot-row">
            <div class="control-group" style="margin-top:2px">
              <label>Time <span id="snapshot-t-val">0%</span></label>
              <input type="range" id="snapshot-t" min="0" max="1" step="0.005" value="0">
            </div>
          </div>
        </div>

        <!-- ── Wave A ─────────────────────────────────────────────── -->
        <div class="ctrl-section">
          <p class="panel-heading heading-a">Wave A &nbsp;→</p>
          <div class="control-group">
            <label>Amplitude <span id="amp-a-val">70%</span></label>
            <input type="range" id="amp-a" min="0" max="100" value="70">
          </div>
        </div>

        <!-- ── Wave B ─────────────────────────────────────────────── -->
        <div class="ctrl-section">
          <p class="panel-heading heading-b">←&nbsp; Wave B</p>
          <div class="control-group">
            <label>Amplitude <span id="amp-b-val">70%</span></label>
            <input type="range" id="amp-b" min="0" max="100" value="70">
          </div>
          <div class="control-group">
            <label>Phase Offset <span id="phase-b-val">0.00π</span></label>
            <input type="range" id="phase-b" min="0" max="6.2832" step="0.01" value="0">
          </div>
        </div>

        <!-- ── Shared wave properties ────────────────────────────── -->
        <div class="ctrl-section">
          <p class="panel-heading">Wave Properties</p>
          <div class="control-group">
            <label>Wavelength <span id="wavelength-val">200 px</span></label>
            <input type="range" id="wavelength" min="60" max="480" value="200">
          </div>
          <div class="control-group">
            <label>Speed <span id="speed-val">80 px/s</span></label>
            <input type="range" id="speed" min="20" max="280" value="80">
          </div>
        </div>

        <!-- ── Display toggles ───────────────────────────────────── -->
        <div class="ctrl-section">
          <p class="panel-heading">Display</p>
          <div class="check-row">
            <label><input type="checkbox" id="show-components" checked> Show components</label>
          </div>
          <div class="check-row" id="env-row">
            <label><input type="checkbox" id="show-envelope"> Show envelope</label>
          </div>
          <div class="check-row" id="node-row">
            <label><input type="checkbox" id="show-nodes"> Show nodes</label>
          </div>
        </div>

        <!-- ── Educational content (auto-populated by nav.js) ────── -->
        <div class="ctrl-section ctrl-edu" id="sim-edu"></div>

      </div>
    </div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
