<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photoelectric Effect</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <!-- Canvas — p5 sketch fills this -->
    <div class="sim-canvas-area" id="canvas-container"></div>

    <!-- Right control panel -->
    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- ── Physics model ─────────────────────────────────────── -->
        <p class="panel-heading">Model</p>
        <div class="btn-group">
          <button class="btn btn-secondary mode-btn" id="mode-btn-classical"
                  onclick="setMode('classical')">Classical</button>
          <button class="btn btn-secondary mode-btn active" id="mode-btn-quantum"
                  onclick="setMode('quantum')">Quantum</button>
        </div>

        <!-- ── Light source ──────────────────────────────────────── -->
        <p class="panel-heading" style="margin-top:14px">Light Source</p>
        <div class="control-group">
          <label>λ = <span id="lam-val">450</span> nm &nbsp;<span id="lam-swatch" class="lam-swatch"></span></label>
          <input type="range" id="lam-slider" min="150" max="750" step="1" value="450">
        </div>
        <div class="control-group" style="margin-top:6px">
          <label>Intensity <span id="int-val">60</span>%</label>
          <input type="range" id="int-slider" min="0" max="100" step="1" value="60">
        </div>

        <!-- ── Metal ─────────────────────────────────────────────── -->
        <p class="panel-heading" style="margin-top:14px">Metal (φ = work function)</p>
        <div class="btn-group">
          <button class="btn btn-secondary metal-btn active" id="metal-btn-cesium"
                  onclick="setMetal('cesium')">Cs 2.0 eV</button>
          <button class="btn btn-secondary metal-btn" id="metal-btn-sodium"
                  onclick="setMetal('sodium')">Na 2.3 eV</button>
        </div>
        <div class="btn-group" style="margin-top:5px">
          <button class="btn btn-secondary metal-btn" id="metal-btn-zinc"
                  onclick="setMetal('zinc')">Zn 4.3 eV</button>
          <button class="btn btn-secondary metal-btn" id="metal-btn-gold"
                  onclick="setMetal('gold')">Au 5.1 eV</button>
        </div>

        <!-- ── Readouts ──────────────────────────────────────────── -->
        <p class="panel-heading" style="margin-top:14px">Readouts</p>
        <div class="energy-info" id="ephoton-readout">E<sub>photon</sub> = —</div>
        <div class="energy-info" id="thresh-readout" style="margin-top:5px">λ<sub>thresh</sub> = — nm</div>
        <div class="energy-info" id="ke-readout" style="margin-top:5px">KE<sub>max</sub> = —</div>

      </div>
    </div>

    <!-- Full-width edu strip — placeholder prevents nav.js auto-population -->
    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
