<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log-Wealth Mixing</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <p class="panel-heading">Finance</p>
        <div class="control-group">
          <label>Drift mu = <span id="val-mu">0.06</span></label>
          <input type="range" id="ctrl-mu" min="0.00" max="0.15" step="0.005" value="0.06">
        </div>
        <div class="control-group">
          <label>Volatility sigma = <span id="val-sigma">0.20</span></label>
          <input type="range" id="ctrl-sigma" min="0.05" max="0.50" step="0.01" value="0.20">
        </div>
        <div class="control-group">
          <label>Paths = <span id="val-paths">120</span></label>
          <input type="range" id="ctrl-paths" min="30" max="200" step="10" value="120">
        </div>
        <div class="control-group">
          <label>Steps = <span id="val-steps">180</span></label>
          <input type="range" id="ctrl-steps" min="80" max="260" step="10" value="180">
        </div>

        <p class="panel-heading">Mixing</p>
        <div class="control-group">
          <label>Particles = <span id="val-particles">200</span></label>
          <input type="range" id="ctrl-particles" min="80" max="320" step="20" value="200">
        </div>
        <div class="control-group">
          <label>Speed = <span id="val-speed">1.2</span></label>
          <input type="range" id="ctrl-speed" min="0.4" max="2.5" step="0.1" value="1.2">
        </div>

        <p class="panel-heading">Run</p>
        <div class="btn-row">
          <button class="btn btn-primary" id="btn-run">Pause</button>
          <button class="btn btn-secondary" id="btn-reset">Reset</button>
        </div>
        <div class="control-group" style="margin-top: 8px">
          <label>
            <input type="checkbox" id="ctrl-loop" checked>
            Loop timeline
          </label>
        </div>

        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary edu-btn active" id="edu-btn-diffusion"
                  onclick="setEduMode('diffusion')">Diffusion</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-mixing"
                  onclick="setEduMode('mixing')">Mixing</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-entropy"
                  onclick="setEduMode('entropy')">Entropy</button>
        </div>
      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
