<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kicked Pendulum</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body>
  <div class="sim-wrapper layout-b">
    <div class="sim-canvas-area" id="canvas-container"></div>
    <div class="sim-panel">
      <div class="sim-controls-section">
        <p class="panel-heading">Controls</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="pendulum-start-button">Start</button>
          <button class="btn btn-secondary" id="pendulum-pause-button">Pause</button>
          <button class="btn btn-secondary" id="pendulum-clear-button">Clear</button>
        </div>
        <div class="control-group" style="margin-top:12px;">
          <label>Kick Strength <span id="kick-value">10</span></label>
          <input type="range" id="kick-slider" min="0" max="50" value="10" step="1">
        </div>
        <div class="control-group">
          <label>Damping <span id="damping-value">0.995</span></label>
          <input type="range" id="damping-slider" min="0.90" max="1.00" value="0.995" step="0.001">
        </div>
      </div>
      <div class="sim-edu-section" id="sim-edu"></div>
    </div>
  </div>
  <script src="sketch.js"></script>
  <script>window.onload = function () { new p5(kickedPendulumSketch); };</script>
</body>
</html>
