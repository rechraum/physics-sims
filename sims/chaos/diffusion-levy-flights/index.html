<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lévy Flights &amp; Brownian Motion</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body>
  <div class="sim-wrapper layout-b">
    <div class="sim-canvas-area" id="canvas-container"></div>
    <div class="sim-panel">
      <div class="sim-controls-section">
        <p class="panel-heading">Controls</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="startBtn">Start</button>
          <button class="btn btn-secondary" id="pauseBtn">Pause</button>
          <button class="btn btn-secondary" id="restartBtn">Restart</button>
        </div>
        <div class="control-group" style="margin-top:12px;">
          <label>Particles <span id="particleCountLabel">25</span></label>
          <input type="range" id="particleCount" min="1" max="50" value="25">
        </div>
        <div class="control-group">
          <label>Speed <span id="simSpeedLabel">1</span></label>
          <input type="range" id="simSpeed" min="0.1" max="10" step="0.1" value="1">
        </div>
        <div class="control-group">
          <label>Step Size <span id="stepSizeLabel">5</span></label>
          <input type="range" id="stepSize" min="1" max="20" value="5">
        </div>
        <div class="control-group">
          <label>Distribution</label>
          <select id="distSelect">
            <option value="gaussian" selected>Brownian (Gaussian)</option>
            <option value="levy">Lévy Flight</option>
          </select>
        </div>
        <div class="control-group" style="flex-direction:row;align-items:center;gap:8px;margin-top:6px;">
          <input type="checkbox" id="pathToggle" checked>
          <label style="flex:1;justify-content:flex-start;margin:0;">Show Pathlines</label>
        </div>
        <button class="btn btn-secondary" id="resetHistBtn" style="margin-top:8px;width:100%;">Reset Histogram</button>
      </div>
      <div class="sim-edu-section" id="sim-edu"></div>
    </div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
