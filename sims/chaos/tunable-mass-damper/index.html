<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tuned Mass Damper</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body>
  <div class="sim-wrapper layout-a">
    <div class="sim-canvas-area" id="canvas-container"></div>
    <div class="sim-panel">
      <div class="sim-controls-section">
        <p class="panel-heading">Parameters</p>
        <div class="control-group">
          <label>Wind Amplitude <span id="wind-amplitude-val">50</span></label>
          <input type="range" id="wind-amplitude-slider" min="0" max="100" value="50">
        </div>
        <div class="control-group">
          <label>Wind Frequency <span id="wind-frequency-val">1.0</span></label>
          <input type="range" id="wind-frequency-slider" min="0.1" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
          <label>Building Height <span id="building-height-val">300</span></label>
          <input type="range" id="building-height-slider" min="200" max="500" value="300">
        </div>
        <div class="control-group">
          <label>Building Stiffness <span id="building-stiffness-val">5.0</span></label>
          <input type="range" id="building-stiffness-slider" min="0.1" max="10" step="0.1" value="5">
        </div>
        <div class="control-group">
          <label>Damper Mass <span id="damping-mass-val">50</span></label>
          <input type="range" id="damping-mass-slider" min="1" max="100" value="50">
        </div>
        <div class="control-group">
          <label>Damper Stiffness <span id="damper-stiffness-val">100</span></label>
          <input type="range" id="damper-stiffness-slider" min="50" max="200" value="100">
        </div>
      </div>
      <div class="sim-edu-section" id="sim-edu"></div>
    </div>
  </div>
  <script src="sketch.js"></script>
</body>
</html>
