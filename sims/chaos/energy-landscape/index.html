<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Landscape</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <p class="panel-heading">Landscape</p>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-new-landscape">New Landscape</button>
        </div>
        <div class="control-group" style="margin-top:8px">
          <label>Roughness <span id="val-roughness">5</span></label>
          <input type="range" id="ctrl-roughness" min="2" max="12" step="1" value="5">
        </div>
        <div class="control-group">
          <label>Amplitude <span id="val-amplitude">1.0</span></label>
          <input type="range" id="ctrl-amplitude" min="0.3" max="2.0" step="0.1" value="1.0">
        </div>

        <div class="divider" style="margin:10px 0"></div>
        <p class="panel-heading">Overlay</p>
        <div class="control-group">
          <label><span style="color:var(--text-primary)">Contour lines</span>
            <input type="checkbox" id="chk-contours" checked>
          </label>
          <label><span style="color:var(--text-primary)">Gradient arrows</span>
            <input type="checkbox" id="chk-gradient">
          </label>
          <label><span style="color:var(--text-primary)">Basin map</span>
            <input type="checkbox" id="chk-basins">
          </label>
        </div>
        <div class="control-group" style="margin-top:8px">
          <label>Color map</label>
          <select id="sel-colormap">
            <option value="thermal">Thermal</option>
            <option value="grayscale">Grayscale</option>
            <option value="plasma">Plasma</option>
            <option value="off">Off</option>
          </select>
        </div>

        <div class="divider" style="margin:10px 0"></div>
        <p class="panel-heading">Mode</p>
        <div class="btn-group">
          <button class="btn btn-secondary mode-btn active" id="btn-mode-roll" onclick="setMode('roll')">Roll</button>
          <button class="btn btn-secondary mode-btn" id="btn-mode-peak" onclick="setMode('peak')">Paint Peak</button>
          <button class="btn btn-secondary mode-btn" id="btn-mode-valley" onclick="setMode('valley')">Paint Valley</button>
        </div>
        <div class="control-group" style="margin-top:8px" id="brush-controls">
          <label>Brush size <span id="val-brush">40</span></label>
          <input type="range" id="ctrl-brush" min="10" max="120" step="5" value="40">
          <label>Strength <span id="val-strength">1.0</span></label>
          <input type="range" id="ctrl-strength" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="divider" style="margin:10px 0"></div>
        <p class="panel-heading">Balls</p>
        <div class="control-group">
          <label>Friction <span id="val-friction">0.02</span></label>
          <input type="range" id="ctrl-friction" min="0.00" max="0.15" step="0.005" value="0.02">
          <label>Speed <span id="val-speed">1.0</span>×</label>
          <input type="range" id="ctrl-speed" min="0.5" max="4.0" step="0.5" value="1.0">
        </div>
        <div class="btn-group" style="margin-top:6px">
          <button class="btn btn-secondary" id="btn-scatter">Scatter 30</button>
          <button class="btn btn-secondary" id="btn-clear-balls">Clear</button>
        </div>
        <div class="control-group" style="margin-top:8px">
          <label>Trail length <span id="val-trail">300</span></label>
          <input type="range" id="ctrl-trail" min="20" max="800" step="20" value="300">
        </div>
        <div class="control-group">
          <label>Ball count <span id="val-ball-count" class="stat-value">0</span></label>
          <label>Settled <span id="val-settled" class="stat-value">0</span></label>
        </div>

      </div>
    </div>
    <div class="sim-edu-strip" id="sim-edu"></div>

  </div>

  <script src="sketch.js"></script>
  <script>
    window.onload = function () { new p5(energyLandscapeSketch); };

    function setMode(m) {
      window._simMode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-mode-' + m).classList.add('active');
      const bc = document.getElementById('brush-controls');
      bc.style.display = (m !== 'roll') ? 'flex' : 'none';
    }
    window._simMode = 'roll';
    document.getElementById('brush-controls').style.display = 'none';
  </script>
</body>
</html>
