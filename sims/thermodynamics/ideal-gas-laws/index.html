<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideal Gas Laws</title>
  <link rel="stylesheet" href="../../../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../../../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- ── Gas ───────────────────────────────────────────────── -->
        <p class="panel-heading">Gas</p>
        <div class="control-group">
          <label>N = <span id="val-n">50</span></label>
          <input type="range" id="ctrl-n" min="10" max="80" step="5" value="50">
        </div>

        <!-- ── State Variables ───────────────────────────────────── -->
        <p class="panel-heading">State Variables</p>
        <div class="control-group">
          <label>T = <span id="val-t">2.00</span></label>
          <input type="range" id="ctrl-t" min="0.5" max="4.0" step="0.05" value="2.0">
        </div>
        <div class="control-group">
          <label>V = <span id="val-v">1.50</span></label>
          <input type="range" id="ctrl-v" min="0.5" max="3.0" step="0.05" value="1.5">
        </div>

        <!-- ── Derived ────────────────────────────────────────────── -->
        <p class="panel-heading">Derived</p>
        <div class="p-readout-row">
          <span class="p-readout-label">P =</span>
          <span class="p-readout-value" id="val-p">66.7</span>
          <span class="p-readout-unit">(N·T/V)</span>
        </div>
        <div class="p-readout-row" style="margin-top:3px">
          <span class="p-readout-label">P/N =</span>
          <span class="p-readout-value" id="val-pn">1.33</span>
          <span class="p-readout-unit">= T/V</span>
        </div>

        <!-- ── Explore ────────────────────────────────────────────── -->
        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary edu-btn active" id="edu-btn-boyle"
                  onclick="setEduMode('boyle')">Boyle</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-charles"
                  onclick="setEduMode('charles')">Charles</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-gay_lussac"
                  onclick="setEduMode('gay_lussac')">Gay-Lussac</button>
        </div>

      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
