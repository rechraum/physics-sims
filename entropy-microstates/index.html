<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entropy &amp; Microstates</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- System -->
        <p class="panel-heading">System</p>
        <div class="control-group">
          <label>N = <span id="val-n">20</span></label>
          <input type="range" id="ctrl-n" min="5" max="60" step="1" value="20">
        </div>
        <div class="control-group">
          <label>M cells</label>
          <select id="ctrl-m" class="ctrl-select" onchange="onMChange()">
            <option value="4">4 (2&times;2)</option>
            <option value="8">8 (2&times;4)</option>
            <option value="16" selected>16 (4&times;4)</option>
            <option value="32">32 (4&times;8)</option>
          </select>
        </div>

        <!-- Initial State -->
        <p class="panel-heading">Initial State</p>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="resetCorner()">All in corner</button>
          <button class="btn btn-secondary" onclick="resetRandom()">Random</button>
        </div>

        <!-- Operations -->
        <p class="panel-heading">Operations</p>
        <div class="btn-group">
          <button class="btn btn-secondary" id="btn-expand"   onclick="doExpand()">Expand</button>
          <button class="btn btn-secondary" id="btn-compress" onclick="doCompress()">Compress</button>
        </div>

        <!-- Simulation -->
        <p class="panel-heading">Simulation</p>
        <div class="control-group">
          <label>Speed = <span id="val-speed">15</span> /s</label>
          <input type="range" id="ctrl-speed" min="1" max="60" step="1" value="15">
        </div>
        <button class="btn btn-secondary" id="btn-pause"
                onclick="togglePause()" style="margin-top:4px;width:100%">Pause</button>

        <!-- Explore -->
        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary edu-btn active" id="edu-btn-boltzmann"
                  onclick="setEduMode('boltzmann')">Boltzmann</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-arrowtime"
                  onclick="setEduMode('arrowtime')">Arrow of Time</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-equilibrium"
                  onclick="setEduMode('equilibrium')">Equilibrium</button>
        </div>

      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
