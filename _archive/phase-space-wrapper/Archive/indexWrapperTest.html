<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P5.js Instance Mode Test</title>
  <!-- Reference to P5.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
</head>
<body>
  <h1>P5.js Instance Mode Test</h1>

  <!-- Button to add and clear oscillators -->
  <button id="addOscillator">Add Oscillator</button>
  <button id="clearOscillators">Clear Oscillators</button>

  <!-- Div for P5.js canvas -->
  <div id="canvas-container" style="width: 800px; height: 400px; border: 1px solid black;"></div>

  <!-- Div for Orbital Mechanics Controls -->
  <div id="orbital-controls">
    <button id="clearObjects">Clear Objects</button>
    <label>
      <input type="checkbox" id="circularCheckbox"> Circular Orbit
    </label>
  </div>

  <!-- Link to the sketch files -->
  <script src="test1DO.js"></script>
  <script src="testOrbital.js"></script>
  
</body>
</html>
