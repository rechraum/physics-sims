<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maxwell-Boltzmann Distribution</title>
  <link rel="stylesheet" href="../shared/style.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="../shared/nav.js" defer></script>
</head>
<body class="sim-body-base">

  <div class="sim-wrapper layout-c">

    <div class="sim-canvas-area" id="canvas-container"></div>

    <div class="sim-panel">
      <div class="sim-controls-section">

        <!-- ── Gas ──────────────────────────────────────────────────── -->
        <p class="panel-heading">Gas</p>
        <div class="control-group">
          <label>N = <span id="val-n">80</span></label>
          <input type="range" id="ctrl-n" min="20" max="200" step="5" value="80">
        </div>
        <div class="control-group">
          <label>m = <span id="val-m">1.0</span></label>
          <input type="range" id="ctrl-m" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>

        <!-- ── Temperature ──────────────────────────────────────────── -->
        <p class="panel-heading">Temperature</p>
        <div class="control-group">
          <label>T = <span id="val-t">1.00</span></label>
          <input type="range" id="ctrl-t" min="0.2" max="5.0" step="0.05" value="1.0">
        </div>
        <div class="btn-group" style="margin-top:4px">
          <button class="btn btn-secondary" onclick="heatCool(1.2)">Heat +20%</button>
          <button class="btn btn-secondary" onclick="heatCool(0.8)">Cool &minus;20%</button>
        </div>
        <button class="btn btn-reset" onclick="doResetSpeeds()" style="margin-top:6px">
          &#x21BA;&thinsp;Reset speeds
        </button>

        <!-- ── Display ─────────────────────────────────────────────── -->
        <p class="panel-heading">Display</p>
        <div class="btn-group">
          <button class="btn btn-secondary marker-btn active" id="btn-vp"
                  onclick="toggleMarker('vp')">v<sub>p</sub></button>
          <button class="btn btn-secondary marker-btn active" id="btn-vmean"
                  onclick="toggleMarker('vmean')">&lang;v&rang;</button>
          <button class="btn btn-secondary marker-btn active" id="btn-vrms"
                  onclick="toggleMarker('vrms')">v<sub>rms</sub></button>
        </div>

        <!-- ── Color map ────────────────────────────────────────────── -->
        <p class="panel-heading" style="margin-top:10px">Color Map</p>
        <select id="ctrl-colormap" class="colormap-select"
                onchange="setColorMap(this.value)">
          <option value="thermal">Thermal (cold/hot)</option>
          <option value="blackbody">Blackbody spectrum</option>
          <option value="rainbow">Rainbow</option>
        </select>

        <!-- ── Explore ──────────────────────────────────────────────── -->
        <p class="panel-heading">Explore</p>
        <div class="btn-group">
          <button class="btn btn-secondary edu-btn active" id="edu-btn-distribution"
                  onclick="setEduMode('distribution')">Distribution</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-equipartition"
                  onclick="setEduMode('equipartition')">Equipartition</button>
          <button class="btn btn-secondary edu-btn" id="edu-btn-evaporation"
                  onclick="setEduMode('evaporation')">Evaporation</button>
        </div>

      </div>
    </div>

    <div class="sim-edu-strip" id="sim-edu"><span></span></div>

  </div>

  <script src="sketch.js"></script>
</body>
</html>
